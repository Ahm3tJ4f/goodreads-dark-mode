<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <div class="popup">
            <div class="popup-header">
                <span class="popup-title">Goodreads Dark Mode</span>
            </div>
            <label class="toggle">
                <input type="checkbox" id="toggle" />
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
                <span class="toggle-label" id="status">Disabled</span>
            </label>
        </div>
        <script src="popup.js"></script>
    </body>
</html>
